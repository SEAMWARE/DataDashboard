<div class="flex flex-col gap-4 w-full">
  @if (loading) {
    <div class="flex flex-col items-center gap-4 py-16">
      <span class="loading loading-spinner loading-lg"></span>
      <span class="opacity-60">Loading data...</span>
    </div>
  }

  @if (error) {
    <div role="alert" class="alert alert-error alert-soft">
      <span class="material-symbols-rounded">error_outline</span>
      <span>{{ error }}</span>
    </div>
  }

  @if (previewLines && !loading) {
    <div class="mockup-code max-h-[60vh] overflow-y-auto overflow-x-auto w-full text-xs">
      @for (line of previewLines; track $index) {
        <pre [attr.data-prefix]="$index + 1"><code>{{ line }}</code></pre>
      }
    </div>

    <div class="join w-full">
      <label class="input join-item input-success input-success-soft flex-1 min-w-0">
        <span class="label">Filename</span>
        <input type="text" [(ngModel)]="filename" [placeholder]="defaultFilename" name="filename" />
      </label>
      <button type="button" class="btn btn-success join-item shrink-0" (click)="download()">
        <span class="material-symbols-rounded">download</span>
        Download
      </button>
    </div>
  }
</div>
