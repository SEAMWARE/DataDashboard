<div class="flex flex-col items-center w-full">
  @if (!showPreview) {
    @if (warningMsg) {
      <div role="alert" class="alert alert-warning alert-soft mt-10 w-full max-w-xl">
        <span class="material-symbols-rounded">warning</span>
        <div>
          <h3 class="font-bold">Warning</h3>
          <span>{{ warningMsg }}</span>
        </div>
      </div>
    }
    <div class="mt-10">
      <button type="button" class="btn btn-soft btn-info" (click)="openPreview()">
        <span class="material-symbols-rounded">preview</span>
        Preview & Download
      </button>
    </div>
  }

  @if (showPreview) {
    <lib-dataset-preview
      class="w-full mt-6"
      [transferId]="transferId"
      [agreement]="agreement"
      [fileExtension]="fileExtension"
      (downloadEvent)="completionEvent.emit()"
    ></lib-dataset-preview>
  }
</div>
